# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - shc-api-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          cd apps/api
          npm install

      - name: Build app
        run: |
          cd apps/api
          npm run build --if-present

      - name: Prepare deployment artifact
        shell: pwsh
        run: |
          $deployDir = "apps/api/deploy"
          if (Test-Path $deployDir) {
            Remove-Item -Recurse -Force $deployDir
          }
          New-Item -ItemType Directory -Path "$deployDir/dist" -Force | Out-Null
          Copy-Item "apps/api/dist/*" "$deployDir/dist" -Recurse -Force
          Copy-Item "apps/api/package.json" "$deployDir/package.json" -Force
          if (Test-Path "apps/api/package-lock.json") {
            Copy-Item "apps/api/package-lock.json" "$deployDir/package-lock.json" -Force
          }
          Copy-Item "apps/api/web.config" "$deployDir/web.config" -Force

      - name: Install production dependencies
        run: |
          cd apps/api/deploy
          npm install --omit=dev

      - name: Create release archive
        shell: pwsh
        run: |
          $zipPath = "apps/api/api-release.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "apps/api/deploy/*" -DestinationPath $zipPath

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/api/api-release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'shc-api-demo'
          slot-name: 'Production'
          package: ./api-release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_07F5A1EC773F4E3D877CB99256B7F7F0 }}